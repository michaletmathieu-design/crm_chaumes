name: Sauvegarde BDD CRM

on:
  schedule:
    # Se lance tous les jours à 2h00 du matin (heure de Paris)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permet de lancer la sauvegarde manuellement depuis GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Installer les outils de base de données
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Créer le backup de la base Supabase
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FILENAME="crm-backup-$(date +%Y-%m-%d_%H-%M-%S).dump"
          pg_dump "$DATABASE_URL" --no-owner --no-acl -F c -f $FILENAME
          echo "Fichier créé : $FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Envoyer vers Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region auto
          aws s3 cp $FILENAME s3://backup-crm-chaumes/db/ --endpoint-url "$AWS_ENDPOINT_URL"
          echo "Backup envoyé avec succès sur Cloudflare R2 !"